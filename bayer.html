<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop | Home</title>

    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #f9f9f9;
        }

        /* Header */
        header {
            background: #1a1a1a;
            color: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            margin: 0;
        }

        nav a {
            color: #fff;
            margin-left: 25px;
            font-size: 16px;
            text-decoration: none;
        }

        nav a:hover {
            color: #ddd;
        }

        /* Banner */
        .banner {
            background: url("https://via.placeholder.com/1600x500") center/cover no-repeat;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-shadow: 0px 0px 15px #000;
            text-align: center;
            padding: 20px;
        }

        .banner h1 {
            font-size: 50px;
            margin: 0;
        }

        /* Categories */
        .categories {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .category {
            background: #fff;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .category img {
            width: 100%;
            border-radius: 12px;
        }

        /* Products */
        .products {
            padding: 40px;
        }

        .products h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .product-grid {
            display: grid;
            gap: 25px;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .product-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 0px 12px rgba(0,0,0,0.1);
        }

        .product-card img {
            width: 100%;
            border-radius: 12px;
        }
