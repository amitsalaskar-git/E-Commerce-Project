<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>

    <style>
        body {
            margin: 0;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        /* Header */
        header {
            background: #222;
            color: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Hero Section */
        .hero {
            background: url("https://via.placeholder.com/1600x450") no-repeat center/cover;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 0 10px black;
            text-align: center;
            flex-direction: column;
        }

        .hero h2 {
            font-size: 48px;
            margin: 0;
        }

        .hero p {
            font-size: 18px;
        }

        /* Products Section */
        .products {
            padding: 40px;
            display: grid;
            gap: 25px;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .product-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        .product-card img {
            width: 100%;
            border-radius: 10px;
        }

        .product-card h3 {
            margin-top: 10px;
            font-size: 20px;
        }

        .product-card p {
            margin: 5px 0;
            color: #555;
        }

        .btn {
            background: #222;
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        .btn:hover {
            background: #444;
        }

        /* Footer */
        footer {
            background: #222;
            color: #ddd;
            padding: 20px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>MyShop</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero -->
    <section class="hero">
        <h2>Welcome to MyShop</h2>
        <p>Discover amazing deals and quality products</p>
    </section>

    <!-- Products -->
    <section class="products">

        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Product">
            <h3>Smart Watch</h3>
            <p>₹1,299</p>
            <a href="#" class="btn">Add to Cart</a>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Product">
            <h3>Bluetooth Speaker</h3>
            <p>₹899</p>
            <a href="#" class="btn">Add to Cart</a>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Product">
            <h3>Wireless Earbuds</h3>
            <p>₹1,499</p>
            <a href="#" class="btn">Add to Cart</a>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Product">
            <h3>Gaming Mouse</h3>
            <p>₹599</p>
            <a href="#" class="btn">Add to Cart</a>
        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 MyShop. All Rights Reserved.</p>
    </footer>

</body>
</html>
``
